site_name: Dynasties of Ash and Wood
site_description: Campaign wiki and session archive for our Pathfinder 2e game set in Chu Ye

theme:
  name: material
  palette:
    scheme: slate
    primary: deep orange
    accent: amber
  font:
    text: Noto Serif
    code: Fira Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.highlight
    - content.tabs.link
  icon:
    logo: material/sword-cross
  favicon: resources/images/image1.png

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Sessions:
    - 0. The Founding: sessions/2026-01-16.md
    - 1. Fire and Favors: sessions/2026-01-30.md
    - 2. Skin a Cat: sessions/2026-02-05.md
    - 3. Mystery at the Mourndusk Willow: sessions/2026-02-12.md
    - 4. Petals, Wings and Hidden Truths: sessions/2026-02-26.md
    - 5. Martial Law: sessions/2026-03-12.md
    - 6. Roots Forgotten, Roots Remembered: sessions/2026-03-19.md
    - 7. Altered Streams: sessions/2026-04-02.md
    - 8. Fault and Judgement: sessions/2026-04-22.md
    - 9. Five Veins, Five Keys: sessions/2026-05-07.md
  - Wiki:
    - Player Characters:
      - Da Baishan: wiki/pcs/da-baishan.md
      - Ginkgo: wiki/pcs/ginkgo.md
      - Donkey: wiki/pcs/donkey.md
      - Boone: wiki/pcs/boone.md
      - Littlefinger: wiki/pcs/littlefinger.md
    - NPCs:
      - The Smiling One: wiki/npcs/the-smiling-one.md
      - Shogun Tsuneni: wiki/npcs/shogun-tsuneni.md
      - Magistrate Kurosawa: wiki/npcs/magistrate-kurosawa.md
      - Mayor Masru: wiki/npcs/mayor-masru.md
      - Mido: wiki/npcs/mido.md
      - Kuji Yasho: wiki/npcs/kuji-yasho.md
      - Yong: wiki/npcs/yong.md
      - Hong: wiki/npcs/hong.md
      - Radiant Willow: wiki/npcs/radiant-willow.md
      - Cassian Voss: wiki/npcs/cassian-voss.md
      - Kimmy: wiki/npcs/kimmy.md
      - Meilin: wiki/npcs/meilin.md
      - Liwen: wiki/npcs/liwen.md
      - Luda: wiki/npcs/luda.md
      - Peony Switchstep: wiki/npcs/peony-switchstep.md
      - Captain Akoto: wiki/npcs/captain-akoto.md
      - Vujravati: wiki/npcs/vujravati.md
      - Shen Takashi: wiki/npcs/shen-takashi.md
    - Factions:
      - Willowshore Ruling Family: wiki/factions/willowshore-ruling-family.md
      - Mizu Ki Hikari: wiki/factions/mizu-ki-hikari.md
      - Council of the Magi: wiki/factions/council-of-the-magi.md
      - Order of the Palatine Eye: wiki/factions/order-of-the-palatine-eye.md
    - Locations:
      - Willowshore: wiki/locations/willowshore.md
      - The Dark Woods: wiki/locations/dark-woods.md
      - Gosembiki Ruins: wiki/locations/gosembiki-ruins.md
      - Hollow of Seven Cedars: wiki/locations/hollow-of-seven-cedars.md
      - Cloudbreaker Cairn: wiki/locations/cloudbreaker-cairn.md
      - River's Lantern Spine: wiki/locations/rivers-lantern-spine.md
      - Terrace of Whispering Clay: wiki/locations/terrace-of-whispering-clay.md
      - Kirahata: wiki/locations/kirahata.md
  - Player Guide: resources/Player Guide.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social: []
